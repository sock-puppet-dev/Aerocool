name: Unlighthouse

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'

jobs:
  audit:
    name: Critical URL audit
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: unlighthouse/package-lock.json

      - name: Install Unlighthouse dependencies
        run: npm ci
        working-directory: unlighthouse

      - name: Type-check Unlighthouse configs
        run: npm run check:types
        working-directory: unlighthouse

      - name: Audit indexable critical URLs
        run: npm run audit:ci:urls
        working-directory: unlighthouse

      - name: Audit technical noindex URLs
        run: npm run audit:ci:technical
        working-directory: unlighthouse

      - name: Upload Unlighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unlighthouse-reports
          path: unlighthouse/reports
