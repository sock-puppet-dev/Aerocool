<!-- static/offline.html -->
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Офлайн</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.2rem;
    }
    button {
      margin-top: 1.5rem;
      padding: 0.5rem 1rem;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1 id="title">Ви поза мережею</h1>
  <p id="message">Схоже, ви втратили з'єднання з інтернетом. Перевірте з'єднання і спробуйте ще раз.</p>
  <button onclick="location.reload()">🔄 Спробувати знову</button>

  <script>
    // Автоопределение языка и замена текста
    const lang = (navigator.languages && navigator.languages[0]) || navigator.language || navigator.userLanguage;
    if (lang && lang.startsWith("ru")) {
      document.documentElement.lang = "ru";
      document.getElementById("title").textContent = "Вы офлайн";
      document.getElementById("message").textContent = "Похоже, у вас нет подключения к интернету. Проверьте соединение и попробуйте снова.";
      document.querySelector("button").textContent = "🔄 Попробовать снова";
    }
  </script>
</body>
</html>
