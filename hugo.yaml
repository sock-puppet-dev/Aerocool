baseURL: https://aerocool.ua/
# Основной URL вашего сайта. В Hugo нужен для генерации абсолютных ссылок.
languageCode: uk-UA
# Язык сайта в формате кодов языков (en-us — английский, США).
title: Aerocool
# Заголовок сайта, обычно выводится в <title> и в логотипе.
theme: PaperMod
#theme: Eclectic
# Переключение между темами, у меня установлены PaperMod, Eclectic

params:
  env: development
# настраиваемый параметр, используемый внутри темы или шаблонов
# для определения окружения (environment), в котором работает сайт.
# production: cайт в боевом режиме, публикуется в интернет, всё реально
# development: cайт в режиме разработки, локально, можно включить отладку
  defaultTheme: light
# Задает тему сайта по умолчанию, обязательно
# Значение "light" означает, что при загрузке сайта будет использоваться светлая тема
  disableThemeToggle: true
# Отключает кнопку переключения темы (светлая/темная) на сайте
# Если true — пользователи не смогут менять тему вручную
  ShowReadingTime: true
# Показывать время чтения в статьях
  ShowShareButtons: true
# Кнопки социальных сетей (если используются)
  ShowPostNavLinks: true
# Ссылки "предыдущая/следующая статья"
  ShowBreadCrumbs: true
# Хлебные крошки (навигация)
  logo: /images/logo.svg
# Путь к логотипу
  label:
    icon: /images/logo.svg
# Путь к логотипу
    iconHeight: 50
# Высота логотипа
    text: " "
# Скрывает текст рядом с логотипом

# путь к фавиконке (иконка сайта на вкладке браузера)
favicon: "/images/favicon.ico"
# канонический URL сайта — указывает поисковикам основной адрес сайта
canonicalURL: "https://aerocool.ua"
# изображение по умолчанию для Open Graph / Twitter Cards (например, логотип)
images: ["/images/logo.svg"]
# указываем Hugo, какие разделы контента считать главными (используется на главной, в RSS и sitemap)
mainSections: ["posts"]

# настройка структуры URL (человекочитаемые адреса) для разных типов контента
permalinks:
  # для контента из папки content/chairs/
  # пример: content/chairs/alpha.md с параметром slug: alpha
  # будет доступен по адресу: https://aerocool.ua/chairs/alpha/
  chairs: /chairs/:slug/
  # аналогично для статей
  # пример: content/articles/ergonomics.md → https://aerocool.ua/articles/ergonomics/
  articles: /articles/:slug/
  # и для новостей
  # пример: content/news/sale.md → https://aerocool.ua/news/sale/
  news: /news/:slug/

# Устанавливает язык по умолчанию (используется, если язык не указан явно)
defaultContentLanguage: uk

# Включает добавление к URL подкаталога для языка по умолчанию (например, /en/)
# Это важно для SEO и симметрии всех URL между языками
defaultContentLanguageInSubdir: true

# Определение доступных языков на сайте
# ==== Украинская версия сайта ====
languages:
  uk:
    languageName: Українська              # Название языка для отображения в переключателе
    languageCode: uk-UA                   # Полный код языка и региона (используется в <html lang="uk-UA"> для SEO)
    weight: 1                             # Чем меньше число, тем выше в списке языков
    params:
      description: "Офіційний сайт Aerocool в Україні"
      # Мета-описание для SEO, можно использовать в <meta name="description">
      title: "Aerocool Україна"
      # Заголовок сайта на украинском языке
      keywords: [ "ігрові крісла", "Aerocool", "крісло для геймерів" ]
      # Ключевые слова для SEO (можно использовать в <meta name="keywords">)
    contentDir: content/uk                # Папка с контентом для этого языка (все страницы для украинской версии)
    menu:
      main:                               # Главное меню (будет отображаться в шапке или навигации)
        - identifier: chairs              # Уникальный ID пункта меню, нужен Hugo для сопоставления с другими языками
          name: Ігрові крісла             # Название пункта меню, отображаемое в интерфейсе
          url: /chairs/                   # Относительный URL. Hugo сам добавит /en/ или /uk/ в зависимости от языка
          weight: 10                      # Вес — чем меньше, тем выше в списке меню
        - identifier: about
          name: Про Aerocool
          url: /about/
          weight: 20
        - identifier: articles
          name: Статті
          url: /articles/
          weight: 30
        - identifier: news
          name: Новини
          url: /news/
          weight: 40
        - identifier: howto
          name: Інструкції
          url: /howto/
          weight: 50
        - identifier: faq
          name: FAQ
          url: /faq/
          weight: 60
        - identifier: contact
          name: Контакти
          url: /contact/
          weight: 70

# ==== Русская версия сайта ====
  ru:
    languageName: Русский                 # Название языка для отображения в переключателе
    languageCode: ru-RU
    weight: 2                             # Порядок отображения языков (второй после английского)
    params:
      description: "Официальный сайт Aerocool в Украине"
      title: "Aerocool Украина"
      keywords: [ "игровые кресла", "Aerocool", "кресло для геймеров" ]
    contentDir: content/ru
    menu:
      main:
        - identifier: chairs              # Тот же identifier, что и в английской версии — это важно
          name: Игровые кресла            # Переведённое название пункта меню
          url: /chairs/                   # URL тот же — Hugo сам поставит /ru/ в начале
          weight: 10
        - identifier: about
          name: Про Aerocool
          url: /about/
          weight: 20
        - identifier: articles
          name: Статьи
          url: /articles/
          weight: 30
        - identifier: news
          name: Новости
          url: /news/
          weight: 40
        - identifier: howto
          name: Инструкции
          url: /howto/
          weight: 50
        - identifier: faq
          name: FAQ
          url: /faq/
          weight: 60
        - identifier: contact
          name: Контакты
          url: /contact/
          weight: 70