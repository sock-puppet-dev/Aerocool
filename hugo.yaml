# Основной URL вашего сайта. В Hugo нужен для генерации абсолютных ссылок.
baseURL: https://aerocool.ua/
# Язык сайта в формате кодов языков (en-us — английский, США).
languageCode: uk-UA
# Заголовок сайта, обычно выводится в <title> и в логотипе.
title: Aerocool
# Переключение между темами, у меня установлены PaperMod, Eclectic
theme: PaperMod
# Hugo использует встроенный минификатор для HTML, CSS, JS и JSON.
# Управляет включением автоматической минификации (сжатия) сгенерированного HTML, CSS, JavaScript
# и других текстовых файлов при сборке сайта.
minify:
  disableXML: true
  minifyOutput: true
# защита от XSS и непреднамеренного выполнения вредоносного кода, особенно если контент редактируют другие
security:
  enableInlineShortcodes: false
# выключения поддержки языков с иероглифическим письмом
hasCJKLanguage: false
# Количество элементов (постов, страниц) на одной странице пагинации
pagination:
  pagerSize: 5
# Флаг включения автоматической генерации файла robots.txt
enableRobotsTXT: true
# Отключает сбор статистики по ID, классам и тегам, которые Hugo встречает в контенте и шаблонах
# Это полезно, если ты хочешь автоматически очищать CSS от неиспользуемого кода
# Позволяет Hugo автоматически обновлять кэш браузера, когда изменяются определённые файлы.
build:
  buildStats:
    enable: false
    disableClasses: false
    disableIDs: false
    disableTags: false
  cachebusters:
    - source: 'assets/watching/hugo_stats\.json'
      target: 'styles\.css'
    - source: '(postcss|tailwind)\.config\.js'
      target: 'css'
    - source: 'assets/.*\.(js|ts|jsx|tsx)'
      target: 'js'
    - source: 'assets/.*\.(css|scss|sass)'
      target: 'css'
    - source: 'assets/.*\.(png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)'
      target: 'images'
    - source: 'assets/.*\.(.*)$'
      target: '$1'
# always — всегда использовать кэш, если файл с таким хэшем уже есть.
  useResourceCacheWhen: always
# Оптимизация изображений, используйте возможности Hugo для обработки изображений,
# чтобы обеспечить их оптимальный размер и качество. Это улучшит время загрузки страниц и SEO.
mediaTypes:
  image/jpeg:
    suffixes:
      - jpg
      - jpeg
    mediaType: image/jpeg

  image/png:
    suffixes:
      - png
    mediaType: image/png

  image/gif:
    suffixes:
      - gif
    mediaType: image/gif

  image/svg+xml:
    suffixes:
      - svg
    mediaType: image/svg+xml

  image/webp:
    suffixes:
      - webp
    mediaType: image/webp

params:
# настраиваемый параметр, используемый внутри темы или шаблонов
# для определения окружения (environment), в котором работает сайт.
# production: cайт в боевом режиме, публикуется в интернет, всё реально
# development: cайт в режиме разработки, локально, можно включить отладку
  env: development
# Пользовательский параметр темы, используется: шаблоны, кастомные блоки темы
  title: Aerocool
# Задает тему сайта по умолчанию, обязательно
# Значение "light" означает, что при загрузке сайта будет использоваться светлая тема
  defaultTheme: light
# Отключает кнопку переключения темы (светлая/темная) на сайте
# Если true — пользователи не смогут менять тему вручную
  disableThemeToggle: true
# images: ["https://aerocool.ua/images/og-image.jpg"]
# Формат даты для вывода на страницах
  DateFormat: "January 2, 2006"
# Показывать время чтения в статьях
  ShowReadingTime: true
# Кнопки социальных сетей (если используются)
  ShowShareButtons: true
# Ссылки "предыдущая/следующая статья"
  ShowPostNavLinks: true
# Хлебные крошки (навигация)
  ShowBreadCrumbs: true
# Включает встроенную функцию Hugo для генерации оглавления (TOC, Table of Contents) на странице.
# Рекомендовано для блогов и сайтов с длинными статьями, чтобы улучшить навигацию по контенту.
# Работает с нативной функцией Hugo, что даёт быстрый и качественный результат.
  UseHugoToc: true
# Путь к логотипу
  logo: /images/logo.svg
  label:
    icon: /images/logo.svg
# Высота логотипа
# Ширина логотипа
# Скрывает текст рядом с логотипом
    iconHeight: 50
    iconWidth: 150
    text: " "
# Включение поддержки структурированных данных (JSON-LD):
# Это поможет поисковым системам лучше понимать содержание вашего сайта.
  structuredData: true
# Для максимально SEO-оптимизированного описания (description) нужно использовать ключевые фразы,
# релевантные теме сайта, которые чаще всего ищут пользователи,
# а также сохранить естественность текста.
  description: > 
    Лучшие эргономичные кресла 2025 года — подробные обзоры, сравнения, рейтинги и советы по выбору 
    офисных и домашних кресел. Купить удобное кресло для здоровья и продуктивности — актуальные цены и отзывы экспертов.
# Многострочный формат с дефисами - — расширенный список
  keywords:
    - эргономичное кресло 2025
    - лучшие кресла для офиса
    - комфортные офисные кресла
    - рейтинг эргономичных кресел
    - как выбрать кресло для спины
    - советы по выбору кресла
    - кресло для работы дома
    - офисная мебель высокого качества
    - эргономика рабочего места
    - умное офисное кресло
    - кресло с поддержкой поясницы
    - экологичные офисные кресла
    - лучшие кресла для геймеров 2025
    - кресла с регулируемой высотой
    - дизайн и комфорт кресел
# Автор
  author: "Aerocool Advanced Technologies Corp. "
# Включает отображение количества слов в постах блога
  ShowWordCount: true
# Управляет особым оформлением первого поста на главной странице (или в списке постов).
  disableSpecial1stPost: true
# false — Кнопка “Scroll to Top” включена и отображается на странице.
  disableScrollToTop: false
# false — комментарии отключены. Пользователи не увидят блок с комментариями под постами.
  comments: false
# false — если хочешь, чтобы посетители видели данные о публикации, авторе и категориях,
# что хорошо для SEO и понимания контекста.
  hidemeta: false
# false — если хочешь показывать краткие анонсы статей на главной странице или в разделах,
# чтобы читатели сразу видели суть поста.
  hideSummary: false
# fuseOpts — параметры поиска Fuse.js
  fuseOpts:
    threshold: 0.3           # Порог совпадения поиска (от 0 до 1). Чем меньше значение, тем более точный поиск
    limit: 10                # Максимальное количество результатов, которые вернёт Fuse.js при поиске.
    keys:                    # Поля из front matter и контента, по которым Fuse.js будет искать совпадения.
      - title                # Заголовок статьи — важнейший параметр для поиска.
      - permalink            # Постоянная ссылка (URL) — для поиска по URL или ссылкам.
      - summary              # Краткое описание статьи — помогает найти статьи по описанию.
      - content              # Полный текст статьи (Markdown без front matter) — поиск по всему тексту.
      - tags                 # Теги статьи — поиск по ключевым словам и темам.
      - categories           # Категории статьи — помогает группировать и находить материалы по тематике.
      - authors              # Авторы статьи — если у статьи есть авторы, по ним тоже можно искать.
      - description          # SEO описание — помогает найти статьи по SEO-описаниям.
      - keywords             # Ключевые слова из front matter — дополнительный набор поисковых терминов.
      - series               # Серии публикаций — поиск по тематическим или хронологическим сериям статей.
# канонический URL сайта — указывает поисковикам основной адрес сайта
  canonicalURL: "https://aerocool.ua/"

sitemap:
  changefreq: monthly
  filename: sitemap.xml
  priority: 0.5

