  assets:
    favicon: "/images/favicon.ico"
# путь к фавиконке (иконка сайта на вкладке браузера)
# основной favicon для браузеров (обычно .ico).
    favicon16x16: "/images/favicon-16x16.png"
    favicon32x32: "/images/favicon-32x32.png"
# PNG-иконки для поддержки различных разрешений
    apple_touch_icon: "/images/apple-touch-icon.png"
# Иконка для iOS-устройств.
    safari_pinned_tab: "/images/safari-pinned-tab.svg"
# SVG-иконка для закрепленных вкладок в Safari (поддержка темного режима).
    disableFingerprinting: false
# Включает добавление хэшей к именам файлов для кэширования.

# изображение по умолчанию для Open Graph / Twitter Cards (например, логотип)
images: ["/images/logo.svg"]
# !!! МАКСИМАЛЬНО УТОЧНИТЬ,
# указываем Hugo, какие разделы контента считать главными (используется на главной, в RSS и sitemap)
mainSections: ["articles"]
# настройка структуры URL (человекочитаемые адреса) для разных типов контента
permalinks:
  # для контента из папки content/products/
  # пример: content/products/alpha.md с параметром slug: alpha
  # будет доступен по адресу: https://aerocool.ua/chairs/alpha/
  products: /products/:slug/
  # аналогично для статей
  # пример: content/articles/ergonomics.md → https://aerocool.ua/articles/ergonomics/
  about: /about/:slug/
  # аналогично
  articles: /articles/:slug/
  # и для новостей
  # пример: content/news/sale.md → https://aerocool.ua/news/sale/
  news: /news/:slug/
  # аналогично
  faq: /faq/:slug/
  # аналогично
  contact: /contact/:slug/
  # аналогично

# Устанавливает язык по умолчанию (используется, если язык не указан явно)
defaultContentLanguage: uk
# Включает добавление к URL подкаталога для языка по умолчанию (например, /en/)
# Это важно для SEO и симметрии всех URL между языками
defaultContentLanguageInSubdir: true

