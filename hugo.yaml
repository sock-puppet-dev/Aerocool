baseURL: https://aerocool.ua/
# Основной URL вашего сайта. В Hugo нужен для генерации абсолютных ссылок.
languageCode: uk-UA
# Язык сайта в формате кодов языков (en-us — английский, США).
title: Aerocool
# Заголовок сайта, обычно выводится в <title> и в логотипе.
theme: PaperMod
#theme: Eclectic
# Переключение между темами, у меня установлены PaperMod, Eclectic
security:
  enableInlineShortcodes: false
# защита от XSS и непреднамеренного выполнения вредоносного кода, особенно если контент редактируют другие
hasCJKLanguage: false
# выключения поддержки языков с иероглифическим письмом
pagination:
  pagerSize: 5
# Количество элементов (постов, страниц) на одной странице пагинации
enableRobotsTXT: true
# Флаг включения автоматической генерации файла robots.txt

build:
  buildStats:
    enable: false
    disableClasses: false
    disableIDs: false
    disableTags: false
  cachebusters:
    - source: 'assets/watching/hugo_stats\.json'
      target: 'styles\.css'
    - source: '(postcss|tailwind)\.config\.js'
      target: 'css'
    - source: 'assets/.*\.(js|ts|jsx|tsx)'
      target: 'js'
    - source: 'assets/.*\.(css|scss|sass)'
      target: 'css'
    - source: 'assets/.*\.(png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)'
      target: 'images'
    - source: 'assets/.*\.(.*)$'
      target: '$1'
# Отключает сбор статистики по ID, классам и тегам, которые Hugo встречает в контенте и шаблонах
# Это полезно, если ты хочешь автоматически очищать CSS от неиспользуемого кода
# Позволяет Hugo автоматически обновлять кэш браузера, когда изменяются определённые файлы.
  useResourceCacheWhen: always
# always — всегда использовать кэш, если файл с таким хэшем уже есть.
mediaTypes:
  image/jpeg:
    suffixes:
      - jpg
      - jpeg
    mediaType: image/jpeg

  image/png:
    suffixes:
      - png
    mediaType: image/png

  image/gif:
    suffixes:
      - gif
    mediaType: image/gif

  image/svg+xml:
    suffixes:
      - svg
    mediaType: image/svg+xml

  image/webp:
    suffixes:
      - webp
    mediaType: image/webp
# Оптимизация изображений, используйте возможности Hugo для обработки изображений,
# чтобы обеспечить их оптимальный размер и качество. Это улучшит время загрузки страниц и SEO.

params:
  env: development
# настраиваемый параметр, используемый внутри темы или шаблонов
# для определения окружения (environment), в котором работает сайт.
# production: cайт в боевом режиме, публикуется в интернет, всё реально
# development: cайт в режиме разработки, локально, можно включить отладку
  defaultTheme: light
# Задает тему сайта по умолчанию, обязательно
# Значение "light" означает, что при загрузке сайта будет использоваться светлая тема
  disableThemeToggle: true
# Отключает кнопку переключения темы (светлая/темная) на сайте
# Если true — пользователи не смогут менять тему вручную
  ShowReadingTime: true
# Показывать время чтения в статьях
  ShowShareButtons: true
# Кнопки социальных сетей (если используются)
  ShowPostNavLinks: true
# Ссылки "предыдущая/следующая статья"
  ShowBreadCrumbs: true
# Хлебные крошки (навигация)
  logo: /images/logo.svg
# Путь к логотипу
  label:
    icon: /images/logo.svg
# Путь к логотипу
    iconHeight: 50
# Высота логотипа
    iconWidth: 150
# Ширина логотипа
    text: " "
# Скрывает текст рядом с логотипом
  structuredData: true
# Включение поддержки структурированных данных (JSON-LD):
# Это поможет поисковым системам лучше понимать содержание вашего сайта.
  description: > 
    Лучшие эргономичные кресла 2025 года — подробные обзоры, сравнения, рейтинги и советы по выбору 
    офисных и домашних кресел. Купить удобное кресло для здоровья и продуктивности — актуальные цены и отзывы экспертов.
# Для максимально SEO-оптимизированного описания (description) нужно использовать ключевые фразы,
# релевантные теме сайта, которые чаще всего ищут пользователи,
# а также сохранить естественность текста.
  keywords:
    - эргономичное кресло 2025
    - лучшие кресла для офиса
    - комфортные офисные кресла
    - рейтинг эргономичных кресел
    - как выбрать кресло для спины
    - советы по выбору кресла
    - кресло для работы дома
    - офисная мебель высокого качества
    - эргономика рабочего места
    - умное офисное кресло
    - кресло с поддержкой поясницы
    - экологичные офисные кресла
    - лучшие кресла для геймеров 2025
    - кресла с регулируемой высотой
    - дизайн и комфорт кресел
# Многострочный формат с дефисами - — расширенный список
  author: "Aerocool Advanced Technologies Corp. "
# Автор
  ShowWordCount: true
# Включает отображение количества слов в постах блога
  disableSpecial1stPost: true
# Управляет особым оформлением первого поста на главной странице (или в списке постов).
  disableScrollToTop: false
# false — Кнопка “Scroll to Top” включена и отображается на странице.
  comments: false
# false — комментарии отключены. Пользователи не увидят блок с комментариями под постами.
  hidemeta: false
# false — если хочешь, чтобы посетители видели данные о публикации, авторе и категориях,
# что хорошо для SEO и понимания контекста.
  hideSummary: false
# false — если хочешь показывать краткие анонсы статей на главной странице или в разделах,
# чтобы читатели сразу видели суть поста.
  fuseOpts:
    threshold: 0.3           # Порог совпадения поиска (от 0 до 1). Чем меньше значение, тем более точный поиск
    limit: 10                # Максимальное количество результатов, которые вернёт Fuse.js при поиске.
    keys:                    # Поля из front matter и контента, по которым Fuse.js будет искать совпадения.
      - title                # Заголовок статьи — важнейший параметр для поиска.
      - permalink            # Постоянная ссылка (URL) — для поиска по URL или ссылкам.
      - summary              # Краткое описание статьи — помогает найти статьи по описанию.
      - content              # Полный текст статьи (Markdown без front matter) — поиск по всему тексту.
      - tags                 # Теги статьи — поиск по ключевым словам и темам.
      - categories           # Категории статьи — помогает группировать и находить материалы по тематике.
      - authors              # Авторы статьи — если у статьи есть авторы, по ним тоже можно искать.
      - description          # SEO описание — помогает найти статьи по SEO-описаниям.
      - keywords             # Ключевые слова из front matter — дополнительный набор поисковых терминов.
      - series               # Серии публикаций — поиск по тематическим или хронологическим сериям статей.
# fuseOpts — параметры поиска Fuse.js
  canonicalURL: "https://aerocool.ua/"
# канонический URL сайта — указывает поисковикам основной адрес сайта
sitemap:
  changefreq: monthly
  filename: sitemap.xml
  priority: 0.5

#services:
#  googleAnalytics:
#    ID: G-XXXXXXXXXX  # ← вставь свой GA4 ID здесь

#  profileMode:
#    enabled: true
# включает homeInfoParams на главной странице
#  homeInfoParams:
#    Title: "Добро пожаловать на Aerocool — эксперты по эргономичным креслам 2025"
#    Content: >
#      Aerocool — ваш надежный источник подробных обзоров, рейтингов и советов по выбору лучших эргономичных кресел
#      для офиса и дома в 2025 году. Узнайте, как улучшить комфорт и здоровье на рабочем месте с
#      помощью современных кресел, проверенных экспертами.



  assets:
    favicon: "/images/favicon.ico"
    # путь к фавиконке (иконка сайта на вкладке браузера)
    # основной favicon для браузеров (обычно .ico).
    favicon16x16: "/images/favicon-16x16.png"
    favicon32x32: "/images/favicon-32x32.png"
    # PNG-иконки для поддержки различных разрешений
    apple_touch_icon: "/images/apple-touch-icon.png"
    # Иконка для iOS-устройств.
    safari_pinned_tab: "/images/safari-pinned-tab.svg"
    # SVG-иконка для закрепленных вкладок в Safari (поддержка темного режима).
    disableFingerprinting: false
    # Включает добавление хэшей к именам файлов для кэширования.


# изображение по умолчанию для Open Graph / Twitter Cards (например, логотип)
images: ["/images/logo.svg"]
# указываем Hugo, какие разделы контента считать главными (используется на главной, в RSS и sitemap)
mainSections: ["posts"]

# настройка структуры URL (человекочитаемые адреса) для разных типов контента
permalinks:
  # для контента из папки content/chairs/
  # пример: content/chairs/alpha.md с параметром slug: alpha
  # будет доступен по адресу: https://aerocool.ua/chairs/alpha/
  chairs: /chairs/:slug/
  # аналогично для статей
  # пример: content/articles/ergonomics.md → https://aerocool.ua/articles/ergonomics/
  about: /about/:slug/
  # аналогично
  articles: /articles/:slug/
  # и для новостей
  # пример: content/news/sale.md → https://aerocool.ua/news/sale/
  news: /news/:slug/
  # аналогично
  howto: /howto/:slug/
  # аналогично
  faq: /faq/:slug/
  # аналогично
  contact: /contact/:slug/
  # аналогично

# Устанавливает язык по умолчанию (используется, если язык не указан явно)
defaultContentLanguage: uk
# Включает добавление к URL подкаталога для языка по умолчанию (например, /en/)
# Это важно для SEO и симметрии всех URL между языками
defaultContentLanguageInSubdir: true

# Определение доступных языков на сайте
# ==== Украинская версия сайта ====
languages:
  uk:
    languageName: Українська              # Название языка для отображения в переключателе
    languageCode: uk-UA                   # Полный код языка и региона (используется в <html lang="uk-UA"> для SEO)
    weight: 1                             # Чем меньше число, тем выше в списке языков
    params:
      description: "Офіційний сайт Aerocool в Україні"
      # Мета-описание для SEO, можно использовать в <meta name="description">
      title: "Aerocool Україна"
      # Заголовок сайта на украинском языке
      keywords: [ "ігрові крісла", "Aerocool", "крісло для геймерів" ]
      # Ключевые слова для SEO (можно использовать в <meta name="keywords">)
    contentDir: content/uk                # Папка с контентом для этого языка (все страницы для украинской версии)
    menu:
      main:                               # Главное меню (будет отображаться в шапке или навигации)
        - identifier: chairs              # Уникальный ID пункта меню, нужен Hugo для сопоставления с другими языками
          name: Ігрові крісла             # Название пункта меню, отображаемое в интерфейсе
          url: /chairs/                   # Относительный URL. Hugo сам добавит /en/ или /uk/ в зависимости от языка
          weight: 10                      # Вес — чем меньше, тем выше в списке меню
        - identifier: about
          name: Про Aerocool
          url: /about/
          weight: 20
        - identifier: articles
          name: Статті
          url: /articles/
          weight: 30
        - identifier: news
          name: Новини
          url: /news/
          weight: 40
        - identifier: howto
          name: Інструкції
          url: /howto/
          weight: 50
        - identifier: faq
          name: FAQ
          url: /faq/
          weight: 60
        - identifier: contact
          name: Контакти
          url: /contact/
          weight: 70

# ==== Русская версия сайта ====
  ru:
    languageName: Русский                 # Название языка для отображения в переключателе
    languageCode: ru-RU
    weight: 2                             # Порядок отображения языков (второй после английского)
    params:
      description: "Официальный сайт Aerocool в Украине"
      title: "Aerocool Украина"
      keywords: [ "игровые кресла", "Aerocool", "кресло для геймеров" ]
    contentDir: content/ru
    menu:
      main:
        - identifier: chairs              # Тот же identifier, что и в английской версии — это важно
          name: Игровые кресла            # Переведённое название пункта меню
          url: /chairs/                   # URL тот же — Hugo сам поставит /ru/ в начале
          weight: 10
        - identifier: about
          name: Про Aerocool
          url: /about/
          weight: 20
        - identifier: articles
          name: Статьи
          url: /articles/
          weight: 30
        - identifier: news
          name: Новости
          url: /news/
          weight: 40
        - identifier: howto
          name: Инструкции
          url: /howto/
          weight: 50
        - identifier: faq
          name: FAQ
          url: /faq/
          weight: 60
        - identifier: contact
          name: Контакты
          url: /contact/
          weight: 70