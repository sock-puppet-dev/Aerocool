# Базовый публичный адрес сайта.
# Hugo использует его для абсолютных canonical URL, sitemap, RSS, Open Graph и JSON-LD.
baseURL: https://aerocool.ua/

# Локаль сайта по умолчанию.
# Для языковых версий ниже локаль переопределяется в languages.uk.locale и languages.ru.locale.
locale: uk-UA

# Техническое имя сайта по умолчанию.
# Для видимого title каждой языковой версии используются languages.uk.title и languages.ru.title.
title: Aerocool

# Активная Hugo-тема.
# Локальные шаблоны в layouts/ имеют приоритет над файлами темы PaperMod.
theme: PaperMod

# false означает, что Hugo приводит части URL к нижнему регистру.
# Это важно для стабильных SEO-адресов и отсутствия дублей с разным регистром.
disablePathToLower: false

# false включает чистые URL без .html на конце.
# Пример: /products/sky/lite/ вместо /products/sky/lite.html.
uglyURLs: false

# false оставляет относительные ссылки относительными.
# Canonical, sitemap и schema.org все равно получают абсолютные URL через baseURL и локальные шаблоны.
canonifyURLs: false

# Taxonomy и term страницы сейчас отключены.
# На сайте нет SEO-стратегии под /tags/ или /categories/, поэтому эти служебные архивы не генерируются.
disableKinds:
  - taxonomy
  - term

# Минификация HTML, CSS, JS и XML при сборке.
# npm-скрипты и Netlify дополнительно запускают Hugo с --minify; это дублирование не меняет результат,
# но оставляет намерение явно видимым в конфиге.
minify:
  minifyOutput: true
  disableCSS: false
  disableJS: false
  disableHTML: false
  disableXML: false

# На сайте украинский и русский языки, поэтому специальные правила подсчета CJK-текста не нужны.
hasCJKLanguage: false

# Единый размер пагинации для главной, /articles/ и /news/.
# Шаблоны используют .Paginate без hardcode-числа, поэтому менять размер нужно здесь.
pagination:
  pagerSize: 6

# Генерирует robots.txt.
# Реальное содержание robots.txt приходит из PaperMod override и зависит от Hugo environment / params.env.
enableRobotsTXT: true

# Блок build нужен для Hugo Pipes и Tailwind CSS 4.
# buildStats записывает hugo_stats.json, чтобы Tailwind видел CSS-классы из шаблонов и контента.
build:
  buildStats:
    enable: true
    disableClasses: false
    disableIDs: false
    disableTags: false

  # cachebusters говорят Hugo, когда нужно пересобрать resource pipeline.
  # Это защищает от ситуации, когда CSS, JS или Tailwind-классы изменились, а старый asset остался в кэше.
  cachebusters:
    - source: assets/.*\.(css|scss|sass)
      target: css
    - source: assets/.*\.(js|ts|jsx|tsx)
      target: js
    - source: assets/.*\.(png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)
      target: images
    - source: assets/notwatching/hugo_stats\.json
      target: css
    - source: package(-lock)?\.json
      target: css

  # always разрешает Hugo использовать resource cache максимально агрессивно.
  # Если появится подозрение на старые assets после правок, сначала запускать сборку с --gc или project clean script.
  useResourceCacheWhen: always

# module.mounts подключает дополнительные источники файлов к виртуальной файловой системе Hugo.
# Первый mount оставляет обычную папку assets доступной как assets/.
# Второй mount делает hugo_stats.json доступным Tailwind через assets/notwatching/hugo_stats.json.
module:
  mounts:
    - source: assets
      target: assets
    - disableWatch: true
      source: hugo_stats.json
      target: assets/notwatching/hugo_stats.json

# Настройки Markdown-рендера Goldmark.
# unsafe: true разрешает HTML внутри content/**/*.md; это нужно для локальных UI-блоков и shortcode-разметки.
# Не использовать это как повод вставлять случайный HTML: для повторяемых блоков лучше делать shortcode или partial.
markup:
  goldmark:
    renderer:
      unsafe: true

# params — проектные и theme-параметры.
# Их читают локальные partials в layouts/_partials и часть шаблонов PaperMod.
params:
  # Временный режим проекта для theme-compatible проверок.
  # Индексируемость в head.html зависит от двух условий: Hugo production environment или params.env: production.
  # Netlify сейчас собирает с --environment development, поэтому опубликованный branch deploy остается noindex,nofollow.
  # Локальная команда npm run build:production собирает index,follow даже при этом fallback-значении.
  # Production в Netlify включать только отдельной задачей после SEO/indexability проверки.
  env: development

  # Заголовок для theme-совместимости.
  # Основные языковые title заданы ниже в languages.
  title: Aerocool

  # Сайт работает только в светлой теме.
  # Темная тема PaperMod не используется в текущем visual layer.
  defaultTheme: light
  disableThemeToggle: true

  # Формат дат для видимых meta-строк, editorial note и похожих блоков.
  # Локализация месяца зависит от language locale.
  DateFormat: "02 January 2006"

  # Время чтения считается Hugo и показывается локальным page-meta.html только для статей.
  ShowReadingTime: true

  # Share buttons и комментарии PaperMod выключены.
  # Их нельзя включать без отдельного UX/SEO решения.
  ShowShareButtons: false
  comments: false

  # Навигация между соседними материалами включена для обычных single pages.
  ShowPostNavLinks: true

  # Хлебные крошки включены.
  # Видимые breadcrumbs и JSON-LD BreadcrumbList должны оставаться синхронными через breadcrumb-label.html.
  ShowBreadCrumbs: true

  # Использовать встроенное оглавление Hugo, если шаблон или страница его выводит.
  UseHugoToc: true

  # Логотип для локальных и theme-шаблонов.
  # Файл лежит в static/images/logo.svg и доступен на сайте как /images/logo.svg.
  logo: /images/logo.svg
  label:
    icon: /images/logo.svg
    iconHeight: 50
    iconWidth: 150
    text: " "

  # JSON-LD не включается отдельным флагом здесь.
  # Schema-слой управляется локальными partials и front matter полем schema_types.

  # Глобальное описание используется как fallback, если у страницы нет своего description.
  # Языковые версии ниже задают более точные локализованные fallback-описания.
  description: >
    Официальный сайт Aerocool в Украине: игровые, офисные и компьютерные кресла серий SKY, WING и XTAL
    для работы, home office и гейминга.

  # Глобальный семантический список тем.
  # Это не meta keywords стратегия для Google; список остается как внутренний fallback/theme-compatible параметр.
  keywords:
    - aerocool кресло
    - aerocool украина
    - игровые кресла aerocool
    - эргономичные кресла aerocool
    - офисные кресла aerocool
    - компьютерные кресла aerocool
    - aerocool sky
    - aerocool wing
    - aerocool xtal
    - aerocool sky lite
    - aerocool sky 360
    - кресло для home office
    - кресло для работы за компьютером
    - кресло для гейминга
    - Synchronous Tilt кресло

  # Организация-автор для RSS и совместимости с theme partials.
  # Видимый author в meta-строке не выводится.
  author: "Aerocool Advanced Technologies Corp."

  # PaperMod умеет выводить word count, но локальный page-meta.html намеренно его скрывает.
  ShowWordCount: true

  # Отключает особое оформление первого поста PaperMod.
  # Главная страница использует собственный layout и карточки.
  disableSpecial1stPost: true

  # Кнопка Scroll to top включена.
  disableScrollToTop: false

  # hidemeta оставлен false, чтобы локальный page-meta.html мог сам решать,
  # какие типы страниц показывают дату и время чтения.
  hidemeta: false

  # Краткие summary в карточках разрешены.
  # Отдельные страницы могут скрывать их через front matter hideSummary.
  hideSummary: false

  # Пути к favicon и related browser icons.
  # Все эти файлы должны лежать в static/ и отдаваться от корня сайта.
  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    safari_pinned_tab: "/safari-pinned-tab.svg"

    # false включает fingerprint для внешних CSS/JS assets.
    # Сейчас CSS в основном inline, но параметр нужен для search.js и будущих внешних assets.
    disableFingerprinting: false

    # true встраивает собранный CSS в <head>, чтобы убрать render-blocking CSS request.
    # Если понадобится вернуть внешний кэшируемый CSS, менять только после PageSpeed/CWV проверки.
    inlineCSS: true

  # Глобальные social links бренда.
  # Они могут использоваться footer/schema/theme-совместимыми partials.
  socialIcons:
    - name: youtube
      url: "https://www.youtube.com/user/Aerocooladmin"
    - name: instagram
      url: "https://www.instagram.com/aerocool_global"
    - name: facebook
      url: "https://www.facebook.com/AeroCoolGlobal/"
    - name: x
      url: "https://x.com/AerocoolGlobal"
    - name: tiktok
      url: "https://www.tiktok.com/@aerocool_global"

  # Глобальные defaults для cover images.
  # Конкретные страницы должны задавать image и cover-блок в front matter по локальным правилам.
  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  # Fallback для Open Graph / Twitter Cards, если страница не дала собственного image.
  images: ["/images/logo.svg"]

# Настройка имени sitemap-файла.
# В проекте есть локальные layouts/sitemap.xml и layouts/sitemapindex.xml для multilingual sitemap.
sitemap:
  filename: sitemap.xml

# Главная страница генерирует HTML, RSS и JSON.
# JSON нужен локальной странице поиска: /search/ и /ru/search/.
outputs:
  home:
    - HTML
    - RSS
    - JSON

# Основные разделы сайта для списков материалов.
# Главная страница берет из них последние статьи и новости.
mainSections: ["articles", "news"]

# Человекочитаемые URL для основных типов контента.
# Front matter url имеет больший приоритет, но обычно использовать slug.
permalinks:
  products: /:sections/:slug/
  articles: /articles/:slug/
  news: /news/:slug/

# Язык по умолчанию — украинский.
# Так как defaultContentLanguageInSubdir: false, украинские URL живут в корне сайта.
defaultContentLanguage: uk

# false сохраняет украинскую версию в корне сайта: /, /products/, /articles/.
# Русская версия остается в языковом подкаталоге: /ru/.
defaultContentLanguageInSubdir: false

# Настройки языков.
# Контентный паттерн проекта: index.md для uk и index.ru.md для ru в одном page bundle.
languages:
  uk:
    # Текст в переключателе языка.
    label: Українська

    # Полная локаль для html lang, RSS language, Open Graph locale и форматирования дат.
    locale: uk-UA

    # Направление текста для html dir.
    direction: ltr

    # Название сайта в украинской версии.
    title: "Aerocool Україна"

    # Первый язык в переключателе и build order.
    weight: 1

    params:
      # Украинский fallback description для страниц без собственного description.
      description: >
        Офіційний сайт Aerocool в Україні. Ігрові, офісні та комп'ютерні крісла серій SKY, WING і XTAL
        для роботи, home office та геймінгу.

      # Украинский семантический список тем.
      # Не превращать в механический список meta keywords.
      keywords:
        - aerocool крісло
        - крісло aerocool
        - aerocool україна
        - ігрові крісла aerocool
        - ергономічні крісла aerocool
        - офісні крісла aerocool
        - комп'ютерні крісла aerocool
        - aerocool sky
        - aerocool wing
        - aerocool xtal
        - aerocool sky lite
        - aerocool sky 360
        - крісло для home office
        - крісло для роботи за комп'ютером
        - крісло для геймінгу
        - Synchronous Tilt крісло

    # Главное меню украинской версии.
    # URL остаются без /uk/ из-за defaultContentLanguageInSubdir: false.
    menu:
      main:
        - identifier: products
          name: Ігрові крісла
          url: /products/
          weight: 10
        - identifier: about
          name: Про Aerocool
          url: /about/
          weight: 20
        - identifier: articles
          name: Статті
          url: /articles/
          weight: 30
        - identifier: news
          name: Новини
          url: /news/
          weight: 40
        - identifier: faq
          name: FAQ
          url: /faq/
          weight: 50
        - identifier: contact
          name: Контакти
          url: /contact/
          weight: 60

  ru:
    # Текст в переключателе языка.
    label: Русский

    # Русская версия ориентирована на пользователей в Украине, поэтому используется ru-UA.
    locale: ru-UA

    # Направление текста для html dir.
    direction: ltr

    # Название сайта в русской версии.
    title: "Aerocool Украина"

    # Второй язык после украинского.
    weight: 2

    params:
      # Русский fallback description для страниц без собственного description.
      description: >
        Официальный сайт Aerocool в Украине. Игровые, офисные и компьютерные кресла серий SKY, WING и XTAL
        для работы, home office и гейминга.

      # Русский семантический список тем.
      # Не превращать в механический список meta keywords.
      keywords:
        - aerocool кресло
        - кресло aerocool
        - aerocool украина
        - игровые кресла aerocool
        - эргономичные кресла aerocool
        - офисные кресла aerocool
        - компьютерные кресла aerocool
        - aerocool sky
        - aerocool wing
        - aerocool xtal
        - aerocool sky lite
        - aerocool sky 360
        - кресло для home office
        - кресло для работы за компьютером
        - кресло для гейминга
        - Synchronous Tilt кресло

    # Главное меню русской версии.
    # URL пишутся так же, как в украинском меню; Hugo сам добавляет /ru/.
    # identifier должен совпадать с украинским меню, чтобы переключение языков и порядок были стабильными.
    menu:
      main:
        - identifier: products
          name: Игровые кресла
          url: /products/
          weight: 10
        - identifier: about
          name: Про Aerocool
          url: /about/
          weight: 20
        - identifier: articles
          name: Статьи
          url: /articles/
          weight: 30
        - identifier: news
          name: Новости
          url: /news/
          weight: 40
        - identifier: faq
          name: FAQ
          url: /faq/
          weight: 50
        - identifier: contact
          name: Контакты
          url: /contact/
          weight: 60
