# Основной URL вашего сайта. В Hugo нужен для генерации абсолютных ссылок.
baseURL: /
# Язык сайта в формате кодов языков (en-us — английский, США).
languageCode: uk-UA
# Заголовок сайта, обычно выводится в <title> и в логотипе.
title: Aerocool
# Переключение между темами, у меня установлены PaperMod, Eclectic
theme: PaperMod
# Определяет, будет ли Hugo автоматически приводить все части URL к нижнему регистру.
disablePathToLower: false
# Определяет формат конечных URL, false — Hugo создаёт чистые URL без .html на конце.
uglyURLs: false
# Hugo Pipes и минификация
# Hugo использует встроенный минификатор для HTML, CSS, JS и JSON.
# Управляет включением автоматической минификации (сжатия) сгенерированного HTML, CSS, JavaScript
# и других текстовых файлов при сборке сайта.
minify:
  minifyOutput: true     # включить глобальную минификацию HTML/CSS/JS
  disableCSS: false      # минификация CSS
  disableJS: false       # минификация JS
  disableHTML: false     # минификация HTML
  disableXML: false      # минификация XML (опционально)
# выключения поддержки языков с иероглифическим письмом
hasCJKLanguage: false
# Количество элементов (постов, страниц) на одной странице пагинации
pagination:
  pagerSize: 5
# Флаг включения автоматической генерации файла robots.txt
enableRobotsTXT: true
# Отключает сбор статистики по ID, классам и тегам, которые Hugo встречает в контенте и шаблонах
# Это полезно, если ты хочешь автоматически очищать CSS от неиспользуемого кода
# Позволяет Hugo автоматически обновлять кэш браузера, когда изменяются определённые файлы.
#build:
#  buildStats:
#    enable: false
#    disableClasses: false
#    disableIDs: false
#    disableTags: false
#  cachebusters:
#    - source: "assets/.*\\.(css|scss|sass)"                                  # кэшировать CSS/SCSS/SASS
#      target: "css"
#    - source: "assets/.*\\.(js|ts|jsx|tsx)"                                  # кэшировать JS/TS
#      target: "js"
#    - source: "assets/.*\\.(png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)"   # кэшировать картинки и шрифты
#      target: "images"
## always — всегда использовать кэш, если файл с таким хэшем уже есть.
#  useResourceCacheWhen: always
#--------------------------------------------------------
# BUILD & MODULE BLOCKS
build:
  buildStats:
    enable: true
    disableClasses: false
    disableIDs: false
    disableTags: false
  cachebusters:
    - source: assets/.*\.(css|scss|sass)
      target: css
    - source: assets/.*\.(js|ts|jsx|tsx)
      target: js
    - source: assets/.*\.(png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)
      target: images
    - source: assets/notwatching/hugo_stats\.json
      target: css
    - source: (postcss|tailwind)\.config\.js
      target: css
  useResourceCacheWhen: always

module:
  mounts:
    - source: assets
      target: assets
    - disableWatch: true
      source: hugo_stats.json
      target: assets/notwatching/hugo_stats.json

#--------------------------------------------------------
# Оптимизация изображений, используйте возможности Hugo для обработки изображений,
# чтобы обеспечить их оптимальный размер и качество. Это улучшит время загрузки страниц и SEO.
# Поддержка современных форматов изображений для SEO и скорости
mediaTypes:
  image/jpeg:
    suffixes: ["jpg", "jpeg"]
  image/png:
    suffixes: ["png"]
  image/gif:
    suffixes: ["gif"]
  image/svg+xml:
    suffixes: ["svg"]
  image/webp:
    suffixes: ["webp"]
  image/avif:
    suffixes: ["avif"]

outputFormats:
  WebP:
    mediaType: image/webp
    isPlainText: false
    isHTML: false
    permalinkable: true
  AVIF:
    mediaType: image/avif
    isPlainText: false
    isHTML: false
    permalinkable: true

params:
# настраиваемый параметр, используемый внутри темы или шаблонов
# для определения окружения (environment), в котором работает сайт.
# production: cайт в боевом режиме, публикуется в интернет, всё реально
# development: cайт в режиме разработки, локально, можно включить отладку
  env: development
# Пользовательский параметр темы, используется: шаблоны, кастомные блоки темы
  title: Aerocool
# Задает тему сайта по умолчанию, обязательно
# Значение "light" означает, что при загрузке сайта будет использоваться светлая тема
  defaultTheme: light
# Отключает кнопку переключения темы (светлая/темная) на сайте
# Если true — пользователи не смогут менять тему вручную
  disableThemeToggle: true
# images: ["https://aerocool.ua/images/og-image.jpg"]
# Формат даты для вывода на страницах
  DateFormat: "02 January 2006"
# Показывать время чтения в статьях
  ShowReadingTime: true
# Кнопки социальных сетей (если используются)
  ShowShareButtons: true
# Ссылки "предыдущая/следующая статья"
  ShowPostNavLinks: true
# Хлебные крошки (навигация)
  ShowBreadCrumbs: true
# Включает встроенную функцию Hugo для генерации оглавления (TOC, Table of Contents) на странице.
# Рекомендовано для блогов и сайтов с длинными статьями, чтобы улучшить навигацию по контенту.
# Работает с нативной функцией Hugo, что даёт быстрый и качественный результат.
  UseHugoToc: true
# Путь к логотипу
  logo: /images/logo.svg
  label:
    icon: /images/logo.svg
# Высота логотипа
    iconHeight: 50
# Ширина логотипа
    iconWidth: 150
# Скрывает текст рядом с логотипом
    text: " "
# Включение поддержки структурированных данных (JSON-LD):
# Это поможет поисковым системам лучше понимать содержание вашего сайта.
  structuredData: true
# Полная поддержка JSON-LD в PaperMod.
  enableJSONLD: true
# Для максимально SEO-оптимизированного описания (description) нужно использовать ключевые фразы,
# релевантные теме сайта, которые чаще всего ищут пользователи,
# а также сохранить естественность текста.
  description: > 
    Лучшие эргономичные кресла 2025 года — подробные обзоры, сравнения, рейтинги и советы по выбору 
    офисных и домашних кресел. Купить удобное кресло для здоровья и продуктивности — актуальные цены и отзывы экспертов.
# Многострочный формат с дефисами - — расширенный список
  keywords:
    - эргономичное кресло 2025
    - лучшие кресла для офиса
    - комфортные офисные кресла
    - рейтинг эргономичных кресел
    - как выбрать кресло для спины
    - советы по выбору кресла
    - кресло для работы дома
    - офисная мебель высокого качества
    - эргономика рабочего места
    - умное офисное кресло
    - кресло с поддержкой поясницы
    - экологичные офисные кресла
    - лучшие кресла для геймеров 2025
    - кресла с регулируемой высотой
    - дизайн и комфорт кресел
# Автор
  author: "Aerocool Advanced Technologies Corp. "
# Включает отображение количества слов в постах блога
  ShowWordCount: true
# Управляет особым оформлением первого поста на главной странице (или в списке постов).
  disableSpecial1stPost: true
# false — Кнопка “Scroll to Top” включена и отображается на странице.
  disableScrollToTop: false
# false — комментарии отключены. Пользователи не увидят блок с комментариями под постами.
  comments: false
# false — если хочешь, чтобы посетители видели данные о публикации, авторе и категориях,
# что хорошо для SEO и понимания контекста.
  hidemeta: false
# false — если хочешь показывать краткие анонсы статей на главной странице или в разделах,
# чтобы читатели сразу видели суть поста.
  hideSummary: false
# !!! МАКСИМАЛЬНО УТОЧНИТЬ,
# fuseOpts — параметры поиска Fuse.js
fuseOpts:
  isCaseSensitive: false      # Игнорировать регистр при поиске (true — учитывать регистр)
  includeScore: false         # Включать в результат оценку релевантности (если нужно для UI)
  shouldSort: true            # Сортировать результаты по релевантности (лучшие выше)
  includeMatches: false       # Включать в результат подробности совпадений (позиции в строке)
  findAllMatches: false       # Искать все совпадения, а не только первое в каждой строке
  minMatchCharLength: 2       # Минимальная длина подстроки для поиска, исключает шум от 1 символа
  location: 0                 # Смещение в строке, с которого начинается поиск (0 — сначала)
  threshold: 0.4              # Чувствительность поиска: 0 — точный матч, 1 — любой матч (0.3 — умеренный)
  distance: 100               # Максимальное расстояние между совпадающими символами (меньше — строже)
  useExtendedSearch: false    # Использовать расширенный синтаксис поиска Fuse.js
  ignoreLocation: false       # Игнорировать параметр location при поиске (искать по всему тексту)
  verbose: false              # Выводить отладочную информацию (для разработчиков)
  # Максимальное количество результатов, которые вернёт поиск
  limit: 15
  # Массив ключей (полей в данных), в которых будет производиться поиск
  keys:
    - "title"       # Заголовок статьи или страницы — самый важный ключ
    - "permalink"   # Постоянная ссылка (URL) — полезна для поиска по URL-частям
    - "summary"     # Краткое описание, аннотация — помогает быстрее находить релевантные материалы
    - "content"     # Полный текст статьи, для глубокого поиска по содержимому

# Канонический URL сайта — указывает поисковикам основной адрес сайта
  canonicalURL: "https://aerocool.ua/"
# Настройка блока картинок для фавиконов
  assets:
    # путь к фавиконке (иконка сайта на вкладке браузера), основной favicon для браузеров (обычно .ico).
    favicon: "/images/favicon.ico"
    # PNG-иконки для поддержки различных разрешений
    favicon16x16: "/images/favicon-16x16.png"
    favicon32x32: "/images/favicon-32x32.png"
    # Иконка для iOS-устройств.
    apple_touch_icon: "/images/apple-touch-icon.png"
    # SVG-иконка для закрепленных вкладок в Safari (поддержка темного режима).
    safari_pinned_tab: "/images/safari-pinned-tab.svg"
    # Включает добавление хэшей к именам файлов для кэширования.
    disableFingerprinting: false
# !!! МАКСИМАЛЬНО УТОЧНИТЬ,
  # Тег верификации Google Search Console
  # googleSiteVerification: "XYZabc"

# !!! МАКСИМАЛЬНО УТОЧНИТЬ,
#services:
  # Твой Google Analytics 4 ID
  #googleAnalytics:
    #ID: "G-XXXXXXXXXX"

# Настроки блока sitemap
sitemap:
  # Частота обновления страниц для поисковиков (рекомендуется указывать для статичных страниц)
  changefreq: weekly
  # Имя файла карты сайта
  filename: sitemap.xml
  # Приоритет страниц (от 0.0 до 1.0)
  priority: 0.7

# Настройка блока socialIcons
socialIcons:
  - name: youtube
    url: "https://www.youtube.com/user/Aerocooladmin"
  - name: instagram
    url: "https://www.instagram.com/aerocool_global"
  - name: facebook
    url: "https://www.facebook.com/AeroCoolGlobal/"
  - name: x
    url: "https://x.com/AerocoolGlobal"
  - name: tiktok
    url: "https://www.tiktok.com/@aerocool_global"

# Блок управления обложками
cover:
  # Показывать обложку (cover image) вообще или полностью скрыть.
  # false — обложка показывается.
  # true — обложка скрыта во всех местах, кроме структурированных данных SEO.
  hidden: false
  # Показывать ли обложку на страницах со списком контента.
  # Например, на главной странице, странице категории, теге, архиве.
  # false — показывать обложку.
  # true — скрывать обложку на списках.
  hiddenInList: false
  # Показывать ли обложку на одиночной странице контента — например, на странице конкретной статьи или продукта.
  # false — показывать обложку.
  # true — скрывать обложку на одиночных страницах.
  hiddenInSingle: false


# изображение по умолчанию для Open Graph / Twitter Cards (например, логотип)
images: ["/images/logo.svg"]
# !!! МАКСИМАЛЬНО УТОЧНИТЬ,
# указываем Hugo, какие разделы контента считать главными (используется на главной, в RSS и sitemap)
mainSections: ["articles", "products", "news"]
# настройка структуры URL (человекочитаемые адреса) для разных типов контента
permalinks:
  # для контента из папки content/products/
  # пример: content/products/alpha.md с параметром slug: alpha
  # будет доступен по адресу: https://aerocool.ua/chairs/alpha/
  products: /products/:slug/
  # аналогично для статей
  # пример: content/articles/ergonomics.md → https://aerocool.ua/articles/ergonomics/
  about: /about/:slug/
  # аналогично
  articles: /articles/:slug/
  # и для новостей
  # пример: content/news/sale.md → https://aerocool.ua/news/sale/
  news: /news/:slug/
  # аналогично
  faq: /faq/:slug/
  # аналогично
  contact: /contact/:slug/
  # аналогично

# Устанавливает язык по умолчанию (используется, если язык не указан явно)
defaultContentLanguage: uk
# Включает добавление к URL подкаталога для языка по умолчанию (например, /en/)
# Это важно для SEO и симметрии всех URL между языками
defaultContentLanguageInSubdir: true

