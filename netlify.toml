# ==========================
# Раздел сборки (Build)
# ==========================
[build]
  # Папка, куда Hugo будет помещать сгенерированные файлы
  publish = "public"
  # Основная команда сборки, последовательно выполняются:
  # 1) Обновление git подмодулей (если есть)
  # 2) Сборка Tailwind CSS через npm
  # 3) Сборка сайта Hugo с очисткой кэша (--gc) и минификацией (--minify)
  command = "git submodule update --init --recursive && npm run build && hugo --gc --minify"

# ==========================
# Переменные окружения для сборки
# ==========================
[build.environment]
  # Версия Hugo, которую использовать на Netlify
  HUGO_VERSION = "0.148.2"
  # Режим сборки Hugo
  # "development" — для тестов и локальной сборки
  # Для production можно ставить "production" (генерация финального кода)
  HUGO_ENV = "development"
  # Часовой пояс для всех сборок
  TZ = "Europe/Kyiv"
  # Версия Node.js для сборки Tailwind
  NODE_VERSION = "22"
  # Флаг npm для решения конфликтов зависимостей
  NPM_FLAGS = "--legacy-peer-deps"  # полезно для Tailwind и других пакетов

# ==========================
# Redirects (перенаправления)
# ==========================
[[redirects]]
  # Все несуществующие URL будут отдавать 404 страницу
  from = "/*"
  to = "/404.html"
  status = 404

# ==========================
# Заголовки безопасности и SEO
# ==========================
[[headers]]
  # Заголовки применяются ко всем страницам
  for = "/*"
  [headers.values]
    # Защита от встраивания сайта в iframe
    X-Frame-Options = "DENY"
    # Защита от неверного определения Content-Type браузером
    X-Content-Type-Options = "nosniff"
    # Политика отправки referrer
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Ограничение доступа к микрофону, камере и геопозиции
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # HSTS — принудительное HTTPS для всех поддоменов
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Content Security Policy для защиты от XSS и внедрений
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https:; font-src 'self' https: data:; connect-src 'self' https:;"
    # Кэширование статики (CSS, JS, изображения) на 1 год
    Cache-Control = "public, max-age=31536000, immutable"
