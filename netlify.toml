# ====================================
# Netlify build configuration
# Hugo v0.155.3 + Tailwind CSS 4.1
# ====================================

[build]
  # Папка с результатом сборки Hugo
  publish = "public"
  # 1) Обновляем git-подмодули 2) Собираем Tailwind CSS  3) Собираем сайт Hugo с очисткой кэша и минификацией
  command = "git submodule update --init --recursive && npm run build && hugo --gc --minify -D"

[build.environment]
  # Версия Hugo
  HUGO_VERSION = "0.157.0"
  # Режим сборки Hugo ("development, production")
  # HUGO_ENV = "production"
  HUGO_ENV = "development"
  # Часовой пояс
  TZ = "Europe/Kyiv"
  # Версия Node.js для сборки Tailwind
  NODE_VERSION = "24"
  # Флаг npm для предотвращения конфликтов зависимостей
  NPM_FLAGS = "--legacy-peer-deps"

# ==========================
# Redirects
# ==========================

# Кастомная страница ошибки 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Убираем редирект preview → production для тестов Lighthouse
# [[redirects]]
#   from = "/*"
#   to = "https://aerocool.ua/:splat"
#   status = 301
#   force = true
#   conditions = { Host = "hugo-aerocool.netlify.app" }

# ====================================
# Headers для безопасности и SEO
# ====================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https:; font-src 'self' https: data:; connect-src 'self' https:;"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
