# ==========================
# Netlify build configuration
# Hugo v0.148.2 + Tailwind CSS 4.1
# ==========================

[build]
  # Папка с результатом сборки Hugo
  publish = "public"
  # 1) Обновляем git-подмодули 2) Собираем Tailwind CSS  3) Собираем сайт Hugo с очисткой кэша и минификацией
  command = "git submodule update --init --recursive && npm run build && hugo --gc --minify"

[build.environment]
  # Версия Hugo
  HUGO_VERSION = "0.148.2"
  # Режим сборки Hugo (для production можно менять на "production")
  HUGO_ENV = "development"
  # Часовой пояс
  TZ = "Europe/Kyiv"
  # Версия Node.js для сборки Tailwind
  NODE_VERSION = "22"
  # Флаг npm для предотвращения конфликтов зависимостей
  NPM_FLAGS = "--legacy-peer-deps"

# Lighthouse — запускать ТОЛЬКО на продакшене и проверять ваш реальный домен
[[context.production.plugins]]
  package = "@netlify/plugin-lighthouse@6"
  # можно добавить несколько страниц
  [[context.production.plugins.inputs.audits]]
    url = "https://aerocool.ua/uk/"

# ==========================
# Redirects
# ==========================
# Редирект с корня домена на украинскую версию (основной язык)
[[redirects]]
  from = "/"
  to = "/uk/"
  status = 301
  force = true
  conditions = { Host = "aerocool.ua" }

# Универсальный редирект для всех остальных путей (только на основном домене)
[[redirects]]
  from = "/*"
  to = "https://aerocool.ua/:splat"
  status = 301
  force = true
  conditions = { Host = "aerocool.ua" }

# Кастомная страница ошибки 404 (для превью и всего остального)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
# ==========================
# Headers для безопасности и SEO
# ==========================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https:; font-src 'self' https: data:; connect-src 'self' https:;"
    Cache-Control = "public, max-age=31536000, immutable"
