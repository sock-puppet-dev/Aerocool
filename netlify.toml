# Основной блок Netlify build configuration Hugo + Tailwind CSS

[build]
  publish = "public"
  # Папка с результатом сборки Hugo
  command = "git submodule update --init --recursive && hugo --gc --minify"
  # 1) Обновляем git-подмодули 2) Собираем сайт Hugo с очисткой кэша и минификацией

[build.environment]
  HUGO_VERSION = "0.161.0"
  # Версия Hugo
  HUGO_ENV = "development"
  # Режим сборки Hugo для боевого деплоя
  TZ = "Europe/Kyiv"
  # Часовой пояс
  NODE_VERSION = "24"
  # Версия Node.js для сборки Tailwind
  NPM_FLAGS = "--legacy-peer-deps"
  # Флаг npm для предотвращения конфликтов зависимостей

# Блок Redirects

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
  # Кастомная страница ошибки 404

# Блок Headers для безопасности и SEO

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https:; font-src 'self' https: data:; connect-src 'self' https:;"
    Cache-Control = "public, max-age=0, must-revalidate, s-maxage=31536000"

# Длительное кэширование статических ресурсов

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.{css,js,woff,woff2,png,jpg,jpeg,gif,svg,webp,avif}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
